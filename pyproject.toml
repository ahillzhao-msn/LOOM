[build-system]
requires = ["setuptools>=75", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "kafed"
version = "2.0.0"
description = "Knowledge Agent Framework for Embedded Data — Five-layer Intelligent Flywheel: Knowledge → Analysis → Finder → Executor → Director"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
keywords = ["rag", "knowledge-management", "sentence-embeddings", "mlops"]

authors = [
    {name = "KAFED Contributors"},
]

classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Text Processing :: Indexing",
]

dependencies = [
    "sentence-transformers>=3.0",
    "chromadb>=1.5",
    "numpy>=1.24",
    "fastapi>=0.110",
    "uvicorn[standard]>=0.29",
    "pydantic>=2.5",
    "aiofiles>=24.0",
]

[project.optional-dependencies]
http = ["requests>=2.31"]
server = ["fastapi>=0.110", "uvicorn[standard]>=0.29"]

[project.urls]
Homepage = "https://github.com/ahillzhao-msn/KAFED"
Repository = "https://github.com/ahillzhao-msn/KAFED"
Documentation = "https://github.com/ahillzhao-msn/KAFED/tree/main/docs"

[project.scripts]
kafed = "kafed.__main__:main"

[tool.setuptools.packages.find]
where = ["src"]
include = ["kafed*"]

[tool.setuptools.package-data]
"kafed" = ["py.typed"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --tb=short"

[tool.ruff]
line-length = 100
target-version = "py310"
extend-select = ["I"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W"]

[tool.coverage.run]
source = ["kafed"]
omit = ["*/tests/*", "*/__pycache__/*"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.:",
]
