# KAFED seed patterns — domain/level/type regex fallback patterns
# All patterns are loaded at runtime; edit this file to customize classification.
# Format: each pattern entry has name, patterns list, and result.

settings:
  embedding_only_confidence_threshold: 0.85
  embedding_score_threshold: 0.65
  embedding_margin_threshold: 0.08
  general_boost_threshold: 0.70

domains:
  # Domain-level patterns are optional; embedding-based classification is primary.
  # Add domain-specific regex patterns here if embedding alone is insufficient.

levels:
  # Knowledge levels: L4 (operational/detailed), L3 (procedural), L2 (conceptual), L1 (general)
  - name: L4
    patterns:
      - "\\b(?:IW\\d{2}|IP\\d{2}|CU\\d{2}|Z[A-Z0-9]{4,}|PM\\d{3})\\b"
      - "\\b(?:transaction|t\\.code|TCD|tcode)\\s+"
  - name: L3
    patterns:
      - "(?:如何|步驟|step|how\\s+to|流程|workflow|pipeline|序列|順序|配置)"
      - "(?:首先|然後|接著|finally|最後|第一步|第二步|step\\s+\\d)"
  - name: L2
    patterns:
      - "(?:區別|difference|vs|versus|關係|relationship|between|結構|architecture|pattern|模式)"
      - "(?:概念|concept|overview|概述|什麼是|是什麼|what\\s+is|定義|definition|設計)"

types:
  # Knowledge types: EXPERIENTIAL, REASONING, PROCEDURAL, DECLARATIVE
  - name: EXPERIENTIAL
    patterns:
      - "(?:不要|避免|注意|小心|陷阱|教訓|pitfall|warning)"
      - "(?:實踐中|經驗|l(?:earn|esson).*(?:found|lesson))"
  - name: REASONING
    patterns:
      - "(?:因為|所以|因此|導致|原因|原理|why|because|therefore)"
      - "(?:區別|difference|vs|versus|關係|關聯|correlation|depends)"
      - "(?:設計模式|權衡|trade.?off|設計決策|decision)"
  - name: PROCEDURAL
    patterns:
      - "(?:step|步驟|流程|how\\s+to|操作|執行|調用|配置|輸入|點擊|点击)"
      - "(?:先|然後|接著|最後|首先|其次|第一步|第二步)"
