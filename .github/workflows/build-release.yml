# LOOM — Build wheel + publish to GitHub Release
# Triggered by pushing a tag v*.*.* or manually via workflow_dispatch.

name: build-release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v4.2.0)'
        required: false
        type: string

jobs:
  build:
    name: Build wheel + upload to release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Build wheel
        run: uv build

      - name: List artifacts
        run: ls -la dist/

      - name: Upload wheel as release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          generate_release_notes: true
          fail_on_unmatched_files: true
