version: "3.9"
services:
  kafed:
    build:
      context: .
    container_name: kafed
    ports:
      - "8765:8765"
    volumes:
      - ./data:/app/data
    environment:
      - KAFED_EMBEDDING_MODEL=BAAI/bge-small-en-v1.5
      - KAFED_E1_MIN_CHUNKS=10
      - KAFED_E3_MIN_ENTRIES=200
    restart: unless-stopped
